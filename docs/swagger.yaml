          type: integer
        description: Delivery ID

    get:
      tags: [Deliveries]
      summary: Get a delivery by ID
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Delivery object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Delivery'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Courier can only view own deliveries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Can only view your own deliveries"
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /deliveries/{id}/complete:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Delivery ID

    patch:
      tags: [Deliveries]
      summary: Complete a delivery (transactional - creates payout)
      description: |
        Runs inside a database transaction:
        1. Sets delivery_status to COMPLETED
        2. Sets order_status to DELIVERED (validated by trigger)
        3. Sets courier status back to AVAILABLE
        4. Calculates payout as 15% of the order total and inserts a Payouts row
        Rolls back entirely on any failure.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Delivery completed with payout info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryCompleteResponse'
        '400':
          description: Invalid state or not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                alreadyCompleted:
                  summary: Delivery already completed
                  value:
                    error: "Delivery already completed"
                notFound:
                  summary: Delivery not found
                  value:
                    error: "Delivery not found"
                notAuthorized:
                  summary: Courier can only complete own delivery
                  value:
                    error: "Not authorized to complete this delivery"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

