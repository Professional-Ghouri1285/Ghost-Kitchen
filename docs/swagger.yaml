  /orders/{id}/cancel:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Order ID

    patch:
      tags: [Orders]
      summary: Cancel an order (Admin only)
      description: |
        Sets order_status to CANCELLED. The database trigger
        `enforce_order_status_transition` prevents cancelling orders
        that are already DELIVERED or CANCELLED.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Order cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Cannot modify order once it is DELIVERED or CANCELLED"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
