  # ==================== Orders ====================
  /orders:
    get:
      tags: [Orders]
      summary: List all orders (Admin + Kitchen Staff)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Array of orders with brand_name
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags: [Orders]
      summary: Place a new order (transactional - deducts inventory)
      description: |
        Creates an order and its line items inside a database transaction.
        For each item the trigger `check_brand_inventory_allocation` validates
        that the brand has not exceeded its allocated share of the ingredient.
        Inventory quantities are deducted atomically; the entire operation
        rolls back on failure.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderInput'
      responses:
        '201':
          description: Order placed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Validation error or insufficient inventory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missingFields:
                  summary: Missing required fields
                  value:
                    error: "brand_id and items array are required"
                insufficientInventory:
                  summary: Not enough inventory
                  value:
                    error: "Insufficient inventory for item 1"
                allocationExceeded:
                  summary: Brand allocation limit exceeded
                  value:
                    error: "Brand inventory allocation exceeded"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /orders/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Order ID

    get:
      tags: [Orders]
      summary: Get order by ID (includes items array)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Order with nested items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetail'
        '401':
